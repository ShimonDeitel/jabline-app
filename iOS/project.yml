name: Jabline
options:
  bundleIdPrefix: com.shimondeitel.vaxtrack
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Jabline:
    type: application
    platform: iOS
    sources:
      - path: Jabline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vaxtrack
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Jabline/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  JablineTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: JablineTests
      - path: Jabline.storekit
    dependencies:
      - target: Jabline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vaxtrack.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  JablineUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: JablineUITests
    dependencies:
      - target: Jabline
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vaxtrack.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Jabline:
    build:
      targets:
        Jabline: all
        JablineTests: [test]
        JablineUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Jabline.storekit
    test:
      config: Debug
      storeKitConfiguration: Jabline.storekit
      targets:
        - JablineTests
        - JablineUITests
    archive:
      config: Release
